<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lupa Password — SideQuest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6C63FF', 'primary-dark': '#5A52E0',
            'primary-light': '#EDE9FF',
            accent: '#FF6B35', 'accent-light': '#FFF1EB',
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body class="min-h-screen bg-[#FFF5F5] font-sans flex items-center justify-center p-6 relative overflow-hidden">

  <!-- Background decorative blobs -->
  <div class="absolute -z-10 w-96 h-96 rounded-full bg-primary/10 blur-3xl -top-20 -left-20"></div>
  <div class="absolute -z-10 w-96 h-96 rounded-full bg-accent/10 blur-3xl -bottom-20 -right-20"></div>

  <!-- Main Recovery Card -->
  <div class="max-w-md w-full bg-white rounded-3xl border border-gray-100 shadow-xl p-8 md:p-10 space-y-8 relative z-10 transition-all duration-300">
    
    <!-- Logo & Link Kembali -->
    <div class="flex items-center justify-between">
      <a href="../index.html" class="text-xl font-extrabold text-primary tracking-tight">SideQuest</a>
      <a href="login.html" class="flex items-center gap-1.5 text-xs font-700 text-gray-500 hover:text-primary transition-colors">
        ← Kembali ke Login
      </a>
    </div>

    <!-- Header Text -->
    <div class="space-y-2">
      <h1 class="text-2xl font-800 text-gray-800">Pulihkan Password 🔒</h1>
      <p class="text-gray-500 text-xs md:text-sm leading-relaxed">
        Masukkan email terdaftar Anda di bawah. Kami akan memverifikasi email Anda di database dan menyimulasikan instruksi pemulihan.
      </p>
    </div>

    <!-- Feedback Banner (Success / Error) -->
    <div id="status-banner" class="hidden p-4 rounded-2xl border text-sm font-500 transition-all"></div>

    <!-- Recovery Form -->
    <form id="forgot-form" class="space-y-5">
      <div>
        <label class="block text-xs font-700 text-gray-600 mb-1.5 uppercase tracking-wide">Alamat Email</label>
        <input type="email" id="inp-email" placeholder="contoh@ui.ac.id" required class="w-full bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-primary focus:bg-white transition-all"/>
      </div>

      <button type="submit" id="btn-submit" class="w-full py-4 rounded-2xl bg-primary text-white font-700 text-sm hover:bg-primary-dark transition-colors shadow-md flex items-center justify-center gap-2">
        Kirim Tautan Pemulihan →
      </button>
    </form>

    <!-- Support Footer -->
    <div class="text-center pt-2">
      <p class="text-xs text-gray-400">
        Mengalami kendala? Hubungi tim support kami di <span class="text-primary font-600">help@sidequest.id</span>
      </p>
    </div>

  </div>

  <script type="module">
    import { api, ui } from '../js/api.js';
    import { requireGuest } from '../js/auth.js';

    // Guest protection
    requireGuest();

    const form = document.getElementById('forgot-form');
    const banner = document.getElementById('status-banner');
    const btnSubmit = document.getElementById('btn-submit');
    const inpEmail = document.getElementById('inp-email');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = inpEmail.value.trim();
      
      // UI Reset
      banner.className = "hidden";
      banner.innerHTML = "";
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = `
        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Memproses Verifikasi…
      `;

      try {
        const response = await api.auth.forgotPassword(email);
        
        // Success glassmorphic view
        banner.className = "p-4 rounded-2xl border border-green-200 bg-green-50 text-green-800 text-xs md:text-sm font-600 leading-relaxed block shadow-sm";
        banner.innerHTML = `
          <div class="flex items-start gap-2.5">
            <span class="text-lg">✅</span>
            <div>
              <p class="font-700">Tautan Berhasil Dikirim!</p>
              <p class="text-green-700/90 font-500 mt-1">${response.message}</p>
            </div>
          </div>
        `;
        ui.toast('Tautan pemulihan berhasil dikirim!', 'success');
        
        // Disable inputs to prevent spamming
        inpEmail.disabled = true;
        btnSubmit.innerHTML = "Instruksi Terkirim ✨";
        btnSubmit.className = "w-full py-4 rounded-2xl bg-gray-100 text-gray-400 font-700 text-sm cursor-not-allowed shadow-none";
      } catch (err) {
        // Error state
        banner.className = "p-4 rounded-2xl border border-red-200 bg-red-50 text-red-800 text-xs md:text-sm font-600 leading-relaxed block shadow-sm";
        banner.innerHTML = `
          <div class="flex items-start gap-2.5">
            <span class="text-lg">❌</span>
            <div>
              <p class="font-700">Gagal Memulihkan Password</p>
              <p class="text-red-700/90 font-500 mt-1">${err.message || 'Email tidak terdaftar.'}</p>
            </div>
          </div>
        `;
        ui.toast(err.message || 'Verifikasi email gagal.', 'error');
        
        // Reset submit button
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = "Kirim Tautan Pemulihan →";
      }
    });
  </script>
</body>
</html>
